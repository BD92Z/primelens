er": "طلب جديد من موقع Prime Lens - Pelsee", "customer": "معلومات الزبون:", "products": "المنتجات:", "qty": "الكمية", "navAccessories": "الإكسسوارات", "navSupport": "التواصل", "menuWarranty": "الضمان", "menuInstall": "التنصيب المجاني", "menuWhatsApp": "واتساب", "menuInstagram": "إنستغرام", "menuAllAccessories": "كل الإكسسوارات"}, "en": {"dir": "ltr", "top": "Prime Lens Iraq · Real warranty and after-sales service · Free installation in Basra city center", "brandSmall": "Prime Lens Iraq", "navProducts": "Products", "navCompare": "Compare", "navContact": "Contact", "cart": "Cart", "searchPlaceholder": "Search model or feature...", "pill": "Pelsee Official Specs · No Prices", "heroTitle": "Safety through a different lens<br><span class='accent'>with Pelsee cameras</span>", "heroText": "Dash Cam Pelsee.", "viewProducts": "View Products", "whatsapp": "WhatsApp", "statsModels": "Pelsee Products", "statsQuality": "Multiple Options", "statsOrder": "WhatsApp / Instagram",
        "heroResolution": "Resolution",
        "heroStorage": "Storage",
        "heroSpeed": "Download Speed",
        "heroFeatured": "Featured Model", "productsTitle": "Available Products", "productsText": "Products, accessories, and recommended memory cards are shown without prices so customers can choose and send an order directly.", "filters": {"all": "All", "s-series": "S Series", "dual": "Front & Rear", "trio": "3-Channel", "mirror": "Mirror", "accessory": "Accessories"}, "add": "Add to Order", "details": "Details", "empty": "No matching results.", "servicesTitle": "Prime Lens Services", "servicesText": "Clear shopping experience, support before and after ordering, and local installation in Basra.", "trust": [["🛡", "Real Warranty", "Real warranty and after-sales service."], ["🔧", "Free Installation", "Free installation in Basra city center."], ["💬", "Purchase Support", "Support before and after purchase to choose the right model."], ["📦", "Organized Ordering", "Add multiple products and send the full order in one message."]], "compareTitle": "Quick Comparison", "compareText": "A simple table to help customers compare models without showing prices.", "compareRows": ["System", "Resolution", "Sensor / Vision", "Wi‑Fi / GPS", "Safety Systems", "Storage"], "feature": "Feature", "ready": "Ready to order?", "readyText": "Choose products and send the order via WhatsApp, or copy it and open Instagram primelens.iraq.", "instagram": "Instagram", "footer": "© 2026 Prime Lens Iraq · Pelsee Dash Cams · Instagram: primelens.iraq", "bestFor": "Best for", "specs": "Specifications", "source": "Official Source", "cartTitle": "Order Cart", "cartText": "Choose models and enter customer information.", "cartEmpty": "Your cart is empty. Add a product from the products section.", "clear": "Clear Cart", "name": "Full Name", "namePh": "Customer name", "phone": "Phone Number", "phonePh": "0788...", "address": "Address", "addressPh": "City / area / nearest landmark", "sendWa": "Send Order via WhatsApp", "sendIg": "Copy Order & Open Instagram", "copy": "Copy Order Only", "req": "Please enter name, phone number, and address.", "emptyCart": "Cart is empty.", "copied": "Order copied.", "igCopied": "Order copied. Instagram will open so you can send it in DM.", "copyFail": "Could not copy automatically.", "orderHeader": "New order from Prime Lens - Pelsee", "customer": "Customer information:", "products": "Products:", "qty": "Qty", "navAccessories": "Accessories", "navSupport": "Support", "menuWarranty": "Warranty", "menuInstall": "Free Installation", "menuWhatsApp": "WhatsApp", "menuInstagram": "Instagram", "menuAllAccessories": "All Accessories"}};
    let activeFilter = "all";
    let cart = [];
    let lang = "ar";

    const $ = (id) => document.getElementById(id);

    function t(key) { return text[lang][key]; }
    function normalize(str) {
      return String(str || "").toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ة/g,"ه");
    }

    function setText(id, value) {
      const el = $(id);
      if (el) el.innerHTML = value;
    }

    function applyLanguage(nextLang) {
      lang = nextLang;
      document.documentElement.lang = lang;
      document.documentElement.dir = t("dir");
      document.body.className = lang;
      $("arBtn").classList.toggle("active", lang === "ar");
      $("enBtn").classList.toggle("active", lang === "en");

      setText("topStrip", t("top"));
      setText("brandSmall", t("brandSmall"));
      document.querySelectorAll("[data-t]").forEach(el => el.textContent = t(el.dataset.t));
      $("openCartBtn").textContent = t("cart");
      $("searchInput").placeholder = t("searchPlaceholder");
      setText("pill", t("pill"));
      setText("heroTitle", t("heroTitle"));
      setText("heroText", t("heroText"));
      setText("viewProducts", t("viewProducts"));
      setText("mainWhatsApp", t("whatsapp"));
      setText("statsModels", t("statsModels"));
      setText("statsQuality", t("statsQuality"));
      setText("statsOrder", t("statsOrder"));
      setText("productsTitle", t("productsTitle"));
      setText("productsText", t("productsText"));
      setText("emptyState", t("empty"));
      setText("servicesTitle", t("servicesTitle"));
      setText("servicesText", t("servicesText"));
      setText("compareTitle", t("compareTitle"));
      setText("compareText", t("compareText"));
      setText("ready", t("ready"));
      setText("readyText", t("readyText"));
      setText("contactWhatsApp", t("whatsapp"));
      setText("contactInstagram", t("instagram"));
      setText("footerText", t("footer"));
      setText("cartTitle", t("cartTitle"));
      setText("cartText", t("cartText"));
      setText("clearCart", t("clear"));
      setText("nameLabel", t("name"));
      setText("phoneLabel", t("phone"));
      setText("addressLabel", t("address"));
      $("customerName").placeholder = t("namePh");
      $("customerPhone").placeholder = t("phonePh");
      $("customerAddress").placeholder = t("addressPh");
      setText("sendWhatsApp", t("sendWa"));
      setText("sendInstagram", t("sendIg"));
      setText("copyOrder", t("copy"));

      renderFilters();
      renderTrust();
      renderProducts();
      renderCompare();
      renderCart();
      setLinks();
      renderHeroCarousel();
      refreshAnimations();
    }

    function renderFilters() {
      const labels = t("filters");
      $("filters").innerHTML = Object.keys(labels).map(key =>
        `<button class="filter-btn ${activeFilter === key ? "active" : ""}" type="button" data-filter="${key}">${labels[key]}</button>`
      ).join("");
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeFilter = btn.dataset.filter;
          renderFilters();
          renderProducts();
          refreshAnimations();
        });
      });
    }

    function productImageHTML(p) {
      return `<img class="product-img" src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.closest('.image-box').querySelector('.image-fallback').style.display='grid'; this.style.display='none';">
              <div class="image-fallback" style="display:none;place-items:center;width:100%;height:100%;font-weight:950;text-align:center;z-index:2;">${p.name}</div>`;
    }

    function renderProducts() {
      const q = normalize($("searchInput").value.trim());
      const list = products.filter(p => {
        const tag = lang === "ar" ? p.tagAr : p.tagEn;
        const sub = lang === "ar" ? p.subAr : p.subEn;
        const best = lang === "ar" ? p.bestAr : p.bestEn;
        const features = lang === "ar" ? p.featuresAr : p.featuresEn;
        const searchable = normalize([p.name, tag, sub, best, ...features].join(" "));
        return (activeFilter === "all" || p.filter === activeFilter) && (!q || searchable.includes(q));
      });

      $("productGrid").innerHTML = list.map(p => {
        const tag = lang === "ar" ? p.tagAr : p.tagEn;
        const sub = lang === "ar" ? p.subAr : p.subEn;
        const features = lang === "ar" ? p.featuresAr : p.featuresEn;
        return `
          <article class="product-card" data-product-id="${p.id}">
            <div class="image-box">
              ${productImageHTML(p)}
            </div>
            <div class="product-content">
              <span class="tag">${tag}</span>
              <h3 class="product-title">${p.name}</h3>
              <div class="product-sub">${sub}</div>
              <div class="feature-list">
                ${features.slice(0,4).map(f => `<div class="feature"><b>✓</b><span>${f}</span></div>`).join("")}
              </div>
              <div class="product-actions">
                <button class="small-btn light" type="button" onclick="addToCart('${p.id}')">${t("add")}</button>
                <button class="small-btn dark" type="button" onclick="openDetails('${p.id}')">${t("details")}</button>
              </div>
            </div>
          </article>
        `;
      }).join("");
      $("emptyState").style.display = list.length ? "none" : "block";
      refreshAnimations();
    }

    function renderTrust() {
      $("trustGrid").innerHTML = t("trust").map(item => `
        <div class="trust">
          <div class="icon">${item[0]}</div>
          <h3>${item[1]}</h3>
          <p>${item[2]}</p>
        </div>
      `).join("");
    }

    function renderCompare() {
      const rows = t("compareRows");
      const compareProducts = products.filter(p => p.filter !== "accessory");
      $("compareTable").innerHTML = `
        <thead><tr><th>${t("feature")}</th>${compareProducts.map(p => `<th>${p.name}</th>`).join("")}</tr></thead>
        <tbody>${rows.map((row, i) => `<tr><td><strong>${row}</strong></td>${compareProducts.map(p => `<td>${p.compare[i]}</td>`).join("")}</tr>`).join("")}</tbody>
      `;
    }

    function openDetails(id) {
      const p = products.find(item => item.id === id);
      if (!p) return;
      const sub = lang === "ar" ? p.subAr : p.subEn;
      const best = lang === "ar" ? p.bestAr : p.bestEn;
      const features = lang === "ar" ? p.featuresAr : p.featuresEn;
      $("modalTitle").textContent = p.name;
      $("modalSub").textContent = sub;
      $("modalBody").innerHTML = `
        <p><strong>${t("bestFor")}:</strong> ${best}</p>
        <h3>${t("specs")}</h3>
        <ul>${features.map(f => `<li>${f}</li>`).join("")}</ul>
        <div class="product-actions">
          <button class="small-btn light" type="button" onclick="addToCart('${p.id}'); closeModalFn(); openCart();">${t("add")}</button>
          <a class="small-btn dark" href="${p.source}" target="_blank" rel="noopener">${t("source")}</a>
        </div>
      `;
      $("modal").classList.add("show");
    }

    function closeModalFn() { $("modal").classList.remove("show"); }
    function openCart() { $("cartBackdrop").classList.add("show"); $("cartDrawer").classList.add("show"); }
    function closeCart() { $("cartBackdrop").classList.remove("show"); $("cartDrawer").classList.remove("show"); }

    function addToCart(id) {
      const item = cart.find(x => x.id === id);
      if (item) item.qty += 1;
      else cart.push({ id, qty: 1 });
      renderCart();
      openCart();
    }

    function updateQty(id, delta) {
      const item = cart.find(x => x.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
      renderCart();
    }

    function renderCart() {
      $("cartCount").textContent = cart.reduce((total, item) => total + item.qty, 0);
      if (!cart.length) {
        $("cartItems").innerHTML = `<p style="color:#343434;padding:16px 0">${t("cartEmpty")}</p>`;
        return;
      }
      $("cartItems").innerHTML = cart.map(item => {
        const p = products.find(x => x.id === item.id);
        const tag = lang === "ar" ? p.tagAr : p.tagEn;
        return `
          <div class="cart-item">
            <img src="${p.image}" alt="${p.name}">
            <div><strong>${p.name}</strong><div style="color:#444;font-size:13px">${tag}</div></div>
            <div class="qty">
              <button type="button" onclick="updateQty('${p.id}', -1)">−</button>
              <span>${item.qty}</span>
              <button type="button" onclick="updateQty('${p.id}', 1)">+</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function validate() {
      if (!cart.length) {
        $("customerError").textContent = t("emptyCart");
        return false;
      }
      if (!$("customerName").value.trim() || !$("customerPhone").value.trim() || !$("customerAddress").value.trim()) {
        $("customerError").textContent = t("req");
        return false;
      }
      $("customerError").textContent = "";
      return true;
    }

    function buildMessage() {
      const lines = [
        t("orderHeader"),
        "-----------------------",
        t("customer"),
        (lang === "ar" ? "الاسم: " : "Name: ") + $("customerName").value.trim(),
        (lang === "ar" ? "الهاتف: " : "Phone: ") + $("customerPhone").value.trim(),
        (lang === "ar" ? "العنوان: " : "Address: ") + $("customerAddress").value.trim(),
        "-----------------------",
        t("products")
      ];
      cart.forEach(item => {
        const p = products.find(x => x.id === item.id);
        lines.push("- " + p.name + " × " + item.qty);
      });
      return lines.join("\n");
    }

    async function copyMessage() {
      try {
        await navigator.clipboard.writeText(buildMessage());
        return true;
      } catch (e) {
        return false;
      }
    }

    function setLinks() {
      const msg = lang === "ar" ? "مرحبا، أريد الاستفسار عن منتجات Pelsee من Prime Lens Iraq" : "Hello, I want to ask about Pelsee products from Prime Lens Iraq";
      const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
      $("mainWhatsApp").href = url;
      $("contactWhatsApp").href = url;
      $("floatingWhatsApp").href = url;
      document.querySelectorAll(".menu-whatsapp").forEach(link => link.href = url);
    }

    function refreshAnimations() {
      requestAnimationFrame(() => {
        document.querySelectorAll(".product-card,.trust").forEach((el, index) => {
          setTimeout(() => el.classList.add("show"), index * 45);
        });
      });
    }

    let heroIndex = 0;
    let heroTimer = null;

    function getHeroProducts() {
      return products.filter(p => p.filter !== "accessory");
    }

    function localizeStorage(value) {
      if (lang === "ar") {
        return String(value || "").replace(" included", " مرفقة");
      }
      return value || "";
    }

    function localizeSpeed(value) {
      const raw = String(value || "");
      if (raw.includes("Wi‑Fi 6")) return lang === "ar" ? "Wi‑Fi 6 سريع" : "Fast Wi‑Fi 6";
      if (raw.includes("5.8")) return lang === "ar" ? "Wi‑Fi 5.8GHz" : "5.8GHz Wi‑Fi";
      if (raw.includes("Wi‑Fi")) return lang === "ar" ? "Wi‑Fi" : "Wi‑Fi";
      return raw.replace(" + GPS", "") || "—";
    }

    function renderHeroDots() {
      const items = getHeroProducts();
      $("heroDots").innerHTML = items.map((_, i) => `<button class="hero-dot ${i === heroIndex ? "active" : ""}" type="button" data-hero-index="${i}" aria-label="Slide ${i+1}"></button>`).join("");
      document.querySelectorAll(".hero-dot").forEach(dot => {
        dot.addEventListener("click", () => {
          heroIndex = Number(dot.dataset.heroIndex);
          renderHeroCarousel();
          restartHeroAuto();
        });
      });
    }

    function renderHeroCarousel() {
      const items = getHeroProducts();
      if (!items.length) return;
      const product = items[heroIndex % items.length];
      const sub = lang === "ar" ? product.subAr : product.subEn;

      $("heroImage").style.opacity = "0.2";
      setTimeout(() => {
        $("heroImage").src = product.image;
        $("heroImage").alt = product.name;
        $("heroImage").style.opacity = "1";
      }, 120);

      $("heroFeaturedLabel").textContent = t("heroFeatured");
      $("heroProductName").textContent = product.name;
      $("heroProductSub").textContent = sub;

      $("heroResolutionLabel").textContent = t("heroResolution");
      $("heroStorageLabel").textContent = t("heroStorage");
      $("heroSpeedLabel").textContent = t("heroSpeed");

      $("heroResolutionValue").textContent = product.compare[1] || "—";
      $("heroStorageValue").textContent = localizeStorage(product.compare[5] || "—");
      $("heroSpeedValue").textContent = localizeSpeed(product.compare[3] || "—");

      renderHeroDots();
    }

    function nextHero(step = 1) {
      const items = getHeroProducts();
      if (!items.length) return;
      heroIndex = (heroIndex + step + items.length) % items.length;
      renderHeroCarousel();
    }

    function restartHeroAuto() {
      if (heroTimer) clearInterval(heroTimer);
      heroTimer = setInterval(() => nextHero(1), 5000);
    }

    function initHeroCarousel() {
      $("heroPrev").addEventListener("click", () => {
        nextHero(-1);
        restartHeroAuto();
      });
      $("heroNext").addEventListener("click", () => {
        nextHero(1);
        restartHeroAuto();
      });
      renderHeroCarousel();
      restartHeroAuto();
    }

    function initTilt() {
      document.addEventListener("mousemove", (e) => {
        document.querySelectorAll(".tilt-area").forEach(area => {
          const rect = area.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width - .5) * 10;
          const y = ((e.clientY - rect.top) / rect.height - .5) * -10;
          if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
            area.style.transform = `perspective(900px) rotateY(${x}deg) rotateX(${y}deg)`;
          } else {
            area.style.transform = "perspective(900px) rotateY(0deg) rotateX(0deg)";
          }
        });
      });
    }

    $("searchButton").addEventListener("click", () => {
      activeFilter = "all";
      renderFilters();
      renderProducts();
      document.querySelector("#products").scrollIntoView({ behavior:"smooth" });
    });
    $("searchInput").addEventListener("keydown", e => { if (e.key === "Enter") $("searchButton").click(); });
    $("searchInput").addEventListener("input", renderProducts);
    $("openCartBtn").addEventListener("click", openCart);
    $("floatingCart").addEventListener("click", openCart);
    $("closeCart").addEventListener("click", closeCart);
    $("cartBackdrop").addEventListener("click", closeCart);
    $("closeModal").addEventListener("click", closeModalFn);
    $("modal").addEventListener("click", e => { if (e.target.id === "modal") closeModalFn(); });
    $("clearCart").addEventListener("click", () => { cart = []; renderCart(); });
    $("arBtn").addEventListener("click", () => applyLanguage("ar"));
    $("enBtn").addEventListener("click", () => applyLanguage("en"));
    $("sendWhatsApp").addEventListener("click", () => {
      if (!validate()) return;
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(buildMessage())}`, "_blank");
    });
    $("sendInstagram").addEventListener("click", async () => {
      if (!validate()) return;
      await copyMessage();
      alert(t("igCopied"));
      window.open(`https://ig.me/m/${INSTAGRAM_HANDLE}`, "_blank");
    });
    $("copyOrder").addEventListener("click", async () => {
      if (!validate()) return;
      const ok = await copyMessage();
      alert(ok ? t("copied") : t("copyFail"));
    });

    function closeDropdowns() {
      document.querySelectorAll(".nav-dropdown.active").forEach(menu => menu.classList.remove("active"));
    }

    function initDropdownMenus() {
      document.querySelectorAll(".dropdown-trigger").forEach(btn => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          const menu = btn.closest(".nav-dropdown");
          const isActive = menu.classList.contains("active");
          closeDropdowns();
          if (!isActive) menu.classList.add("active");
        });
      });

      document.querySelectorAll(".menu-product").forEach(btn => {
        btn.addEventListener("click", () => {
          const productId = btn.dataset.product;
          closeDropdowns();

          activeFilter = "all";
          $("searchInput").value = "";
          renderFilters();
          renderProducts();

          setTimeout(() => {
            const card = document.querySelector(`[data-product-id="${productId}"]`);
            if (card) {
              card.scrollIntoView({ behavior:"smooth", block:"center" });
              document.querySelectorAll(".product-card.focused").forEach(el => el.classList.remove("focused"));
              card.classList.add("focused");
              setTimeout(() => card.classList.remove("focused"), 2200);
            } else {
              document.querySelector("#products").scrollIntoView({ behavior:"smooth" });
            }
          }, 120);
        });
      });

      document.querySelectorAll(".menu-filter").forEach(btn => {
        btn.addEventListener("click", () => {
          activeFilter = btn.dataset.filterMenu || "all";
          closeDropdowns();
          renderFilters();
          renderProducts();
          document.querySelector("#products").scrollIntoView({ behavior:"smooth" });
        });
      });

      document.addEventListener("click", closeDropdowns);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeDropdowns();
      });
      document.querySelectorAll(".dropdown-menu").forEach(menu => {
        menu.addEventListener("click", (event) => event.stopPropagation());
      });
    }

    initDropdownMenus();
    initHeroCarousel();
    initTilt();
    applyLanguage("ar");
  </script>
</body>
</html>
